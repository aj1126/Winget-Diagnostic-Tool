name: Lint and Validate PowerShell

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  lint:
    name: Run PSScriptAnalyzer
    runs-on: windows-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Run PSScriptAnalyzer
        shell: pwsh
        run: |
          Install-Module -Name PSScriptAnalyzer -Force -SkipPublisherCheck
          $results = Invoke-ScriptAnalyzer -Path .\Repair-WingetAlias.ps1
          if ($results) {
              $results | Format-Table
              throw "Script analyzer found warnings or errors!"
          } else {
              Write-Output "No issues found by PSScriptAnalyzer."
          }
